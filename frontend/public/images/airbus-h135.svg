<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" fill="none">
  <rect width="640" height="260" fill="#e8eaf6"/>
  <rect width="640" height="160" fill="#c5cae9"/>
  <rect y="200" width="640" height="60" fill="#c8e6c9"/>
  <rect y="195" width="640" height="10" fill="#a5d6a7"/>
  <!-- Body -->
  <ellipse cx="300" cy="140" rx="75" ry="28" fill="#1565c0"/>
  <ellipse cx="300" cy="140" rx="70" ry="24" fill="#1976d2"/>
  <!-- Cockpit -->
  <ellipse cx="245" cy="136" rx="28" ry="20" fill="#42a5f5"/>
  <ellipse cx="240" cy="133" rx="18" ry="12" fill="#bbdefb" opacity="0.7"/>
  <!-- Tail boom -->
  <rect x="370" y="133" width="130" height="10" rx="5" fill="#1565c0"/>
  <!-- Tail rotor -->
  <ellipse cx="500" cy="126" rx="3" ry="18" fill="#64b5f6"/>
  <rect x="496" y="108" width="8" height="36" rx="4" fill="#42a5f5" opacity="0.6"/>
  <!-- Tail fin -->
  <polygon points="485,133 505,113 505,133" fill="#1976d2"/>
  <!-- Fenestron ring -->
  <circle cx="500" cy="126" r="14" stroke="#1565c0" stroke-width="3" fill="none"/>
  <!-- Main rotor -->
  <rect x="145" y="109" width="310" height="4" rx="2" fill="#64b5f6" opacity="0.8"/>
  <circle cx="300" cy="111" r="5" fill="#0d47a1"/>
  <!-- Skids -->
  <rect x="260" y="163" width="6" height="28" rx="2" fill="#0d47a1"/>
  <rect x="340" y="163" width="6" height="28" rx="2" fill="#0d47a1"/>
  <rect x="248" y="188" width="110" height="5" rx="2" fill="#1565c0"/>
  <!-- Stripe -->
  <rect x="225" y="145" width="150" height="3" rx="1" fill="#fff" opacity="0.5"/>
  <!-- Label -->
  <text x="320" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#1565c0">Airbus H135</text>
</svg>
