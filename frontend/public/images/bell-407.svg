  <rect x="155" y="107" width="310" height="5" rx="2" fill="#ef9a9a" opacity="0.8"/>
  <circle cx="310" cy="110" r="6" fill="#b71c1c"/>
  <!-- Skids -->
  <rect x="268" y="168" width="7" height="28" rx="2" fill="#b71c1c"/>
