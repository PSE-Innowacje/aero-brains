server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:aero;DB_CLOSE_DELAY=-1;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: false

  sql:
    init:
      mode: always
      data-locations: classpath:db/seed/data-h2.sql

logging:
  level:
    pl.aerobrains: DEBUG
