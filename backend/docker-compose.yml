services:
  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: aero-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: aero
      APP_USER_PASSWORD: aero
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  oracle-data: