version: '3.3'

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: aero-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: aero
      APP_USER_PASSWORD: aero
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  backend:
    build: .
    container_name: aero-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: aero
      SPRING_DATASOURCE_PASSWORD: aero
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      - oracle
    restart: on-failure

volumes:
  oracle-data:
